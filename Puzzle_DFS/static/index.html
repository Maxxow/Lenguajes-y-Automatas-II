<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle DFS Solver</title>
    <meta name="description"
        content="Resuelve puzzles lineales de 4 elementos usando el algoritmo de búsqueda en profundidad (DFS)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8f9fc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1d2e;
            --text-secondary: #6b7194;
            --text-muted: #9da3c0;
            --accent: #6366f1;
            --accent-light: #a5b4fc;
            --accent-bg: #eef2ff;
            --border: #e5e7f0;
            --success: #10b981;
            --success-bg: #ecfdf5;
            --error: #ef4444;
            --error-bg: #fef2f2;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header */
        header {
            width: 100%;
            padding: 24px 0;
            text-align: center;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.85);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 400;
        }

        /* Main */
        main {
            width: 100%;
            max-width: 720px;
            padding: 32px 20px 64px;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card+.card {
            margin-top: 20px;
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Input Group */
        .input-section {
            margin-bottom: 24px;
        }

        .input-section:last-of-type {
            margin-bottom: 0;
        }

        .input-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: block;
        }

        .input-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: block;
        }

        .input-text {
            width: 100%;
            height: 52px;
            padding: 0 18px;
            font-size: 1.15rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.06em;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .input-text:focus {
            border-color: var(--accent);
            background: var(--accent-bg);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .input-text::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0;
        }

        /* Button */
        .btn-solve {
            width: 100%;
            margin-top: 28px;
            padding: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-solve:hover {
            background: #4f46e5;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
            transform: translateY(-1px);
        }

        .btn-solve:active {
            transform: translateY(0);
        }

        .btn-solve:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-solve.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes spin {
            to {
                transform: translateY(-50%) rotate(360deg);
            }
        }

        /* Message */
        .message {
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .message.success {
            display: block;
            background: var(--success-bg);
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .message.error {
            display: block;
            background: var(--error-bg);
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        /* Results */
        #results-container {
            display: none;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--accent-bg);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--accent);
        }

        .stat-chip .stat-num {
            font-weight: 700;
            font-size: 1rem;
        }

        /* Steps list */
        .steps-timeline {
            position: relative;
            padding-left: 0;
        }

        .step-item {
            padding: 10px 0;
            display: flex;
            align-items: center;
            gap: 16px;
            animation: fadeIn 0.3s ease both;
            border-bottom: 1px solid var(--border);
        }

        .step-item:last-child {
            border-bottom: none;
        }

        .step-number {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 36px;
        }

        .step-blocks {
            display: flex;
            gap: 6px;
        }

        .step-block {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 8px;
            background: var(--bg-primary);
            border: 1.5px solid var(--border);
            color: var(--text-primary);
        }

        .step-item:first-child .step-block {
            border-color: var(--accent-light);
            background: var(--accent-bg);
            color: var(--accent);
        }

        .step-item:last-child .step-block {
            border-color: #6ee7b7;
            background: var(--success-bg);
            color: #059669;
        }

        .step-label {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-left: auto;
            padding: 4px 10px;
            background: var(--bg-primary);
            border-radius: 6px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 20px;
            }

            .input-text {
                height: 48px;
                font-size: 1.1rem;
            }

            .step-block {
                width: 38px;
                height: 38px;
                font-size: 0.95rem;
            }

            .stats-row {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Puzzle <span>DFS</span></h1>
        <p>Búsqueda en profundidad para puzzle lineal de 4 elementos</p>
    </header>

    <main>
        <!-- Input Card -->
        <div class="card" id="input-card">
            <div class="card-title">Puzzle DFS</div>

            <div class="input-section">
                <label class="input-label">Estado Inicial</label>
                <span class="input-hint">Ingresa 4 números separados por coma (ej: 4,2,3,1)</span>
                <input type="text" class="input-text" id="input-initial" placeholder="4,2,3,1" value="4,2,3,1">
            </div>

            <div class="input-section">
                <label class="input-label">Estado Solucion</label>
                <span class="input-hint">Ingresa 4 números separados por coma (ej: 1,2,3,4)</span>
                <input type="text" class="input-text" id="input-solution" placeholder="1,2,3,4" value="1,2,3,4">
            </div>

            <button class="btn-solve" id="btn-solve" onclick="solvePuzzle()">
                Resolver Puzzle
            </button>

            <div class="message" id="message"></div>
        </div>

        <!-- Results Card -->
        <div class="card" id="results-container">
            <div class="card-title">Resultado</div>
            <div class="stats-row" id="stats-row"></div>
            <div class="steps-timeline" id="steps-timeline"></div>
        </div>
    </main>

    <footer>
        Puzzle DFS Solver — Algoritmo de Búsqueda en Profundidad
    </footer>

    <script>
        function parseValues(inputId) {
            const raw = document.getElementById(inputId).value.trim();
            const parts = raw.split(',').map(s => parseInt(s.trim()));
            if (parts.length !== 4) return null;
            if (parts.some(v => isNaN(v) || v < 1 || v > 4)) return null;
            if (new Set(parts).size !== 4) return null;
            return parts;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
        }

        function clearMessage() {
            const msg = document.getElementById('message');
            msg.className = 'message';
        }

        async function solvePuzzle() {
            clearMessage();
            const btn = document.getElementById('btn-solve');
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.style.display = 'none';

            const estado_inicial = parseValues('input-initial');
            const solucion = parseValues('input-solution');

            if (!estado_inicial) {
                showMessage('Estado inicial inválido. Usa los números 1-4 sin repetir.', 'error');
                return;
            }
            if (!solucion) {
                showMessage('Solución inválida. Usa los números 1-4 sin repetir.', 'error');
                return;
            }

            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = 'Resolviendo...';

            try {
                const response = await fetch('/api/resolver', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado_inicial, solucion })
                });

                if (!response.ok) {
                    const err = await response.json();
                    showMessage(err.detail || 'Error al resolver el puzzle', 'error');
                    return;
                }

                const data = await response.json();
                showMessage(data.mensaje, 'success');
                renderResults(data);
            } catch (e) {
                showMessage('Error de conexión con el servidor', 'error');
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = 'Resolver Puzzle';
            }
        }

        function renderResults(data) {
            const container = document.getElementById('results-container');
            const statsRow = document.getElementById('stats-row');
            const timeline = document.getElementById('steps-timeline');

            // Stats
            statsRow.innerHTML = `
            <div class="stat-chip">
                <span>Pasos</span>
                <span class="stat-num">${data.total_pasos}</span>
            </div>
            <div class="stat-chip">
                <span>Estados</span>
                <span class="stat-num">${data.pasos.length}</span>
            </div>
        `;

            // Timeline
            timeline.innerHTML = '';
            data.pasos.forEach((paso, idx) => {
                const item = document.createElement('div');
                item.className = 'step-item';
                item.style.animationDelay = `${idx * 0.06}s`;

                let label = '';
                if (idx === 0) label = 'Inicio';
                else if (idx === data.pasos.length - 1) label = 'Solución';

                const blocks = paso.map((val) => {
                    return `<div class="step-block">${val}</div>`;
                }).join('');

                item.innerHTML = `
                <span class="step-number">Paso ${idx}</span>
                <div class="step-blocks">${blocks}</div>
                ${label ? `<span class="step-label">${label}</span>` : ''}
            `;

                timeline.appendChild(item);
            });

            container.style.display = 'block';
        }

        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') solvePuzzle();
        });
    </script>

</body>

</html>
